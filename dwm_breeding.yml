meta:
  game: Dragon Warrior Monsters (GBC)
  schema_version: 1
  notes:
  - This file stores specific breeding recipes for DWM1 monsters.
  - recipe_groups preserve grouped source formulas; recipes is the fully-expanded explicit list.
  - Requirement raw strings are preserved alongside parsed fields so later scripts can add route-planning rules without losing
    source intent.
  sources:
  - name: kwolfer2/monster-json monsterData.json
    role: primary structured monster dataset
    url: https://raw.githubusercontent.com/kwolfer2/monster-json/refs/heads/main/monsterData.json
  - name: dragonwarriormonsters.tech info page
    role: describes that the breeding wizard is powered by a GitHub JSON of monsters and possible parents
    url: https://dragonwarriormonsters.tech/info.html
  - name: GameFAQs RSlickback Monster Breeding / Boss Family
    role: pedigree ordering, hierarchy rules, and boss-chain corrections
    url: https://gamefaqs.gamespot.com/gbc/197155-dragon-warrior-monsters/faqs/80057/monster-breeding
  - name: Woodus DWM1 Boss Breeding Chart
    role: boss-family cross-check
    url: https://www.woodus.com/den/games/dwm1gbc/breeding-details.php?fam=boss
